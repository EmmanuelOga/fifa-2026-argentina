# Cloudflare Pages config for `wrangler pages deploy` and local `wrangler pages dev`.
# The dashboard Git integration (recommended) doesn't need this file, but it keeps
# CLI deploys and local Functions testing reproducible.
name = "fifa-2026-argentina"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

# ── Ask-the-research chat (functions/api/ask.ts) ──
# The API key is a SECRET — set it with:
#   wrangler pages secret put ANTHROPIC_API_KEY
# (or in the Pages dashboard → Settings → Environment variables, encrypted).
# Do NOT put it here.

# Bot protection (optional): Cloudflare Turnstile. Create a widget at
# dash.cloudflare.com → Turnstile, paste the SITE key into src/data/meta.ts
# (turnstileSiteKey) and set the SECRET with:
#   wrangler pages secret put TURNSTILE_SECRET_KEY

# Chat model. Sonnet 5 balances answer quality and cost for the corpus-grounded
# Q&A (~$0.006 per cached question at intro pricing). The code default (unset)
# is claude-opus-4-8.
[vars]
CHAT_MODEL = "claude-sonnet-5"

# KV namespace: logs questions the corpus can't answer AND backs the chat's
# rate limiter (per-IP hourly cap + site-wide daily breaker in ask.ts).
[[kv_namespaces]]
binding = "QUESTIONS"
id = "c28393030afa4776a611c6bca60a5879"
